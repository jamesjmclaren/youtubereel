name: Daily YouTube Short

on:
  schedule:
    # Runs daily at 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      preset:
        description: "Content preset (auto = auto-rotate)"
        required: false
        type: choice
        options:
          - auto
          - weekly-movers-premium
          - monthly-movers-premium
          - weekly-biggest-drops
          - budget-movers
          - daily-hot
          - monthly-drops
          - weekly-movers-all
      skip_upload:
        description: "Skip YouTube upload (dry run)"
        required: false
        type: boolean
        default: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            libnss3 libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libxshmfence1

      - name: Install dependencies
        run: npm ci

      - name: Write YouTube tokens
        env:
          YOUTUBE_TOKENS: ${{ secrets.YOUTUBE_TOKENS }}
        run: printenv YOUTUBE_TOKENS > tokens.json

      - name: Write .env
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          echo "YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID}" > .env
          echo "YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET}" >> .env

      - name: Run pipeline
        env:
          INPUT_PRESET: ${{ inputs.preset }}
          INPUT_SKIP_UPLOAD: ${{ inputs.skip_upload }}
        run: |
          ARGS=""
          if [ -n "$INPUT_PRESET" ] && [ "$INPUT_PRESET" != "auto" ]; then
            ARGS="--preset=$INPUT_PRESET"
          fi
          if [ "$INPUT_SKIP_UPLOAD" = "true" ]; then
            ARGS="$ARGS --no-upload"
          fi
          node --env-file=.env --import tsx/esm src/index.ts $ARGS

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-${{ github.run_id }}
          path: output/
          retention-days: 7
